<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LUXURYDETAILING</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#0f172a;
color:white;
}

header{
background:#1e3a8a;
padding:20px;
text-align:center;
}

.container{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;
padding:40px;
}

.product{
background:#1e293b;
padding:20px;
border-radius:10px;
width:250px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.product img{
width:100%;
border-radius:8px;
}

button{
margin-top:10px;
background:#2563eb;
color:white;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

</style>
</head>

<body>

<header>
<h1>LUXURYDETAILING</h1>
<p>Dobrodošli na naš site</p>
</header>

<div class="container">

<div class="product">
<img src="https://via.placeholder.com/250">
<h3>SMALL PACK</h3>
<p>Cijena: 35€</p>
<button>Kupi</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/250">
<h3>STANDARD PACK</h3>
<p>Cijena: 70€</p>
<button>Kupi</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/250">
<h3>FULL PACK</h3>
<p>Cijena: 110€</p>
<button>Kupi</button>
</div>

</div>

</body>
</html>
